AWSTemplateFormatVersion: "2010-09-09"
Description: SES domain identity + DKIM/SPF/DMARC DNS + SQS FIFO queue + Lambda for sending emails.

Parameters:
  ProjectName:
    Type: String
    Default: octopodai
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  SenderDomain:
    Type: String
    Default: octopodai.app
    Description: Domain to verify in SES (must have a Route53 hosted zone)
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Default: Z01109651O85TIUV7ZIYT
    Description: Route53 hosted zone ID for SenderDomain (used for DKIM/SPF/DMARC records)
  SesFromEmail:
    Type: String
    Default: outreach@octopodai.app
    Description: Verified SES sender email address (must match SenderDomain).

Resources:
  # ── SES Domain Identity ────────────────────────────────────────────
  # Verifies SenderDomain in SES + enables DKIM signing.
  SesDomainIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SenderDomain
      DkimAttributes:
        SigningEnabled: true
      MailFromAttributes:
        MailFromDomain: !Sub "bounce.${SenderDomain}"
        BehaviorOnMxFailure: USE_DEFAULT_VALUE

  # ── DKIM CNAME records (3) — SES auto-emits DKIM token attributes ─
  # Once these resolve in DNS, SES auto-marks the domain as verified.
  DkimRecord1:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesDomainIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: '600'
      ResourceRecords:
        - !GetAtt SesDomainIdentity.DkimDNSTokenValue1

  DkimRecord2:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesDomainIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: '600'
      ResourceRecords:
        - !GetAtt SesDomainIdentity.DkimDNSTokenValue2

  DkimRecord3:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesDomainIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: '600'
      ResourceRecords:
        - !GetAtt SesDomainIdentity.DkimDNSTokenValue3

  # ── SPF for the MAIL FROM subdomain (bounce handling) ──────────────
  MailFromSpfRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "bounce.${SenderDomain}"
      Type: TXT
      TTL: '600'
      ResourceRecords:
        - '"v=spf1 include:amazonses.com -all"'

  # ── SPF for the apex domain (so direct sends from @octopodai.app pass) ─
  # NOTE: if octopodai.app already has an SPF TXT record (e.g. for Google
  # Workspace), this will collide. CFN will fail; in that case merge
  # manually instead and remove this resource.
  ApexSpfRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref SenderDomain
      Type: TXT
      TTL: '600'
      ResourceRecords:
        - '"v=spf1 include:amazonses.com -all"'

  # ── DMARC policy ───────────────────────────────────────────────────
  # quarantine = mark suspicious mail as spam (don't bounce). Tighten
  # to "reject" once you've confirmed no false positives via the
  # rua= aggregate reports.
  DmarcRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "_dmarc.${SenderDomain}"
      Type: TXT
      TTL: '600'
      ResourceRecords:
        - !Sub '"v=DMARC1; p=quarantine; rua=mailto:dmarc@${SenderDomain}; ruf=mailto:dmarc@${SenderDomain}; fo=1"'

  # ── MAIL FROM domain MX (bounce handling) ──────────────────────────
  MailFromMxRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "bounce.${SenderDomain}"
      Type: MX
      TTL: '600'
      ResourceRecords:
        - "10 feedback-smtp.us-west-2.amazonses.com"


  # ── Dead-Letter Queue ──────────────────────────────────────────────
  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${Environment}-email-dlq.fifo"
      FifoQueue: true
      MessageRetentionPeriod: 1209600  # 14 days

  # ── Main FIFO Queue ────────────────────────────────────────────────
  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${ProjectName}-${Environment}-email-queue.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      MessageRetentionPeriod: 345600  # 4 days
      VisibilityTimeout: 360          # > Lambda timeout
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 3

  # ── Lambda Execution Role ──────────────────────────────────────────
  EmailSenderLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-${Environment}-email-sender-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmailSenderPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt EmailQueue.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # ── Lambda Function ────────────────────────────────────────────────
  EmailSenderLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-${Environment}-email-sender"
      Runtime: python3.11
      Handler: handler.handler
      MemorySize: 128
      Timeout: 300
      Role: !GetAtt EmailSenderLambdaRole.Arn
      Environment:
        Variables:
          SES_FROM_EMAIL: !Ref SesFromEmail
      Code:
        ZipFile: |
          import json, logging, boto3
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          ses = boto3.client("ses")

          def handler(event, context):
              for record in event["Records"]:
                  payload = json.loads(record["body"])
                  sender = payload.get("senderEmail", "")
                  sender_name = payload.get("senderName", "")
                  source = f"{sender_name} <{sender}>" if sender_name else sender
                  ses.send_email(
                      Source=source,
                      Destination={"ToAddresses": [payload["to"]]},
                      Message={
                          "Subject": {"Data": payload["subject"], "Charset": "UTF-8"},
                          "Body": {
                              "Html": {"Data": payload["bodyHtml"], "Charset": "UTF-8"},
                              "Text": {"Data": payload.get("bodyText", ""), "Charset": "UTF-8"},
                          },
                      },
                  )
                  logger.info("Sent email %s to %s", payload.get("messageId"), payload["to"])
              return {"statusCode": 200}

  # ── SQS → Lambda Event Source Mapping ──────────────────────────────
  EmailQueueEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt EmailQueue.Arn
      FunctionName: !GetAtt EmailSenderLambda.Arn
      BatchSize: 10
      Enabled: true

Outputs:
  EmailQueueUrl:
    Description: URL of the email SQS FIFO queue
    Value: !Ref EmailQueue
    Export:
      Name: !Sub "${ProjectName}-${Environment}-email-queue-url"

  EmailQueueArn:
    Description: ARN of the email SQS FIFO queue
    Value: !GetAtt EmailQueue.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-email-queue-arn"

  EmailSenderLambdaArn:
    Description: ARN of the email sender Lambda
    Value: !GetAtt EmailSenderLambda.Arn
    Export:
      Name: !Sub "${ProjectName}-${Environment}-email-sender-lambda-arn"
