AWSTemplateFormatVersion: "2010-09-09"
Description: Cognito User Pool for Octopod authentication

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  UserPoolDomainPrefix:
    Type: String
    Default: octopodai-dev
    Description: Prefix for the Cognito hosted UI domain

  CallbackURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3001/auth/callback,https://octopodai.app/auth/callback"
    Description: Comma-separated OAuth2 callback URLs

  LogoutURLs:
    Type: CommaDelimitedList
    Default: "http://localhost:3001,https://octopodai.app"
    Description: Comma-separated post-logout redirect URLs

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub octopod-${Environment}-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      UserPoolTags:
        Environment: !Ref Environment
        Project: octopod

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref UserPoolDomainPrefix
      UserPoolId: !Ref UserPool

  FrontendAppClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub octopod-${Environment}-frontend
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_PASSWORD_AUTH
      SupportedIdentityProviders:
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs: !Ref CallbackURLs
      LogoutURLs: !Ref LogoutURLs
      PreventUserExistenceErrors: ENABLED
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolId

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolArn

  FrontendAppClientId:
    Description: App Client ID for the frontend
    Value: !Ref FrontendAppClient
    Export:
      Name: !Sub ${AWS::StackName}-FrontendAppClientId

  UserPoolDomainURL:
    Description: Cognito hosted UI domain URL
    Value: !Sub https://${UserPoolDomainPrefix}.auth.${AWS::Region}.amazoncognito.com
    Export:
      Name: !Sub ${AWS::StackName}-UserPoolDomainURL

  CognitoRegion:
    Description: AWS region where the User Pool is deployed
    Value: !Ref AWS::Region
    Export:
      Name: !Sub ${AWS::StackName}-CognitoRegion
